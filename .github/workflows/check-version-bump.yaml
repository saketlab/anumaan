on:
  pull_request:
    branches: [main]

name: Check version bump

permissions: read-all

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR version
        id: pr_version
        run: |
          PR_VERSION=$(grep '^Version:' DESCRIPTION | sed 's/Version: //')
          echo "version=$PR_VERSION" >> "$GITHUB_OUTPUT"

      - name: Get main version
        id: main_version
        run: |
          git fetch origin main
          MAIN_VERSION=$(git show origin/main:DESCRIPTION | grep '^Version:' | sed 's/Version: //')
          echo "version=$MAIN_VERSION" >> "$GITHUB_OUTPUT"

      - name: Compare versions
        run: |
          PR="${{ steps.pr_version.outputs.version }}"
          MAIN="${{ steps.main_version.outputs.version }}"
          echo "PR version: $PR"
          echo "Main version: $MAIN"
          # Normalize versions to 4 dot-separated segments (padding with zeros)
          # so that e.g. "1.2" and "1.2.0" are treated as equal, matching R's numeric_version() semantics
          normalize() {
            echo "$1" | awk -F. '{for(i=NF+1;i<=4;i++) $i=0; OFS="."; print $1,$2,$3,$4}'
          }
          PR_NORM=$(normalize "$PR")
          MAIN_NORM=$(normalize "$MAIN")
          if [ "$PR_NORM" = "$MAIN_NORM" ]; then
            echo "::error::Version in DESCRIPTION ($PR) has not been bumped. Please increment the version number."
            exit 1
          fi
          # Compare normalized versions using sort -V
          LOWER=$(printf '%s\n%s' "$PR_NORM" "$MAIN_NORM" | sort -V | head -n1)
          if [ "$LOWER" != "$MAIN_NORM" ]; then
            echo "::error::PR version ($PR) is not greater than main version ($MAIN). Please increment the version number."
            exit 1
          fi
          echo "Version bump verified: $MAIN -> $PR"
