on:
  pull_request:
    branches: [main]

name: Check version bump

permissions: read-all

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR version
        id: pr_version
        run: |
          PR_VERSION=$(grep '^Version:' DESCRIPTION | sed 's/Version: //')
          echo "version=$PR_VERSION" >> "$GITHUB_OUTPUT"

      - name: Get main version
        id: main_version
        run: |
          git fetch origin main
          MAIN_VERSION=$(git show origin/main:DESCRIPTION | grep '^Version:' | sed 's/Version: //')
          echo "version=$MAIN_VERSION" >> "$GITHUB_OUTPUT"

      - name: Compare versions
        run: |
          PR="${{ steps.pr_version.outputs.version }}"
          MAIN="${{ steps.main_version.outputs.version }}"
          echo "PR version: $PR"
          echo "Main version: $MAIN"
          if [ "$PR" = "$MAIN" ]; then
            echo "::error::Version in DESCRIPTION ($PR) has not been bumped. Please increment the version number."
            exit 1
          fi
          # Compare dot-separated version segments lexicographically using sort -V
          LOWER=$(printf '%s\n%s' "$PR" "$MAIN" | sort -V | head -n1)
          if [ "$LOWER" != "$MAIN" ]; then
            echo "::error::PR version ($PR) is not greater than main version ($MAIN). Please increment the version number."
            exit 1
          fi
          echo "Version bump verified: $MAIN -> $PR"
