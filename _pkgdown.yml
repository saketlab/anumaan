url: https://saketlab.github.io/anumaan/

development:
  mode: release

template:
  bootstrap: 5
  light-switch: true
  preset: default
  bslib:
    primary: "#0071e3"
    border-radius: "0.5rem"
  includes:
    in_header: |
      <link rel="stylesheet" href="extra.css">
      <meta name="keywords" content="AMR, antimicrobial resistance, R package, burden estimation, YLL, YLD, DALY, GBD, India, surveillance, hospital infections, MDR, XDR">
      <meta name="author" content="Saket Choudhary, Nilanjana Dey, Nima Jijo, Namrata Kharat">
      <meta name="robots" content="index, follow">
      <meta property="og:type" content="website">
      <meta property="og:url" content="https://saketlab.github.io/anumaan/">
      <meta property="og:title" content="anumaan - AMR Surveillance Preprocessing and Burden Estimation">
      <meta property="og:description" content="R package for preprocessing antimicrobial resistance surveillance data and estimating disease burden using GBD methodology.">
      <meta property="og:site_name" content="anumaan">
      <meta property="og:locale" content="en_US">
      <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "anumaan",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Windows, macOS, Linux",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "description": "R package for preprocessing antimicrobial resistance surveillance data and estimating disease burden",
        "author": {
          "@type": "Organization",
          "name": "Saket Lab",
          "url": "https://saketlab.org"
        },
        "url": "https://saketlab.github.io/anumaan/",
        "downloadUrl": "https://github.com/saketlab/anumaan",
        "programmingLanguage": "R"
      }
      </script>

home:
  title: "anumaan - AMR Surveillance Preprocessing and Burden Estimation"
  description: >
    R package for preprocessing antimicrobial resistance surveillance data
    and estimating disease burden (YLL, YLD, DALY) using GBD methodology.

  links:
  - text: Browse source code
    href: https://github.com/saketlab/anumaan
  - text: Report a bug
    href: https://github.com/saketlab/anumaan/issues

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github, lightswitch]

  components:
    reference:
      text: Reference
      href: reference/index.html

    articles:
      text: Articles
      menu:
      - text: Getting Started
        href: articles/getting-started.html

    news:
      text: Changelog
      href: news/index.html

    github:
      icon: fab fa-github fa-lg
      href: https://github.com/saketlab/anumaan
      aria-label: GitHub

reference:
- title: "Pipeline"
  desc: "Main preprocessing pipeline and configuration"
  contents:
  - run_preprocess
  - amr_config
  - validate_config
  - print.amr_config
  - print.amr_result
  - summary.amr_result
  - print.amr_preprocessing_report

- title: "Standardization"
  desc: "Standardize column names, organisms, antibiotics, specimens, and values"
  contents:
  - prep_standardize_column_names
  - prep_standardize_organisms
  - prep_standardize_antibiotics
  - prep_standardize_specimens
  - prep_standardize_sex
  - prep_standardize_outcome
  - prep_clean_ast_values
  - prep_recode_intermediate_ast
  - prep_parse_date_column
  - prep_coerce_dates

- title: "Classification"
  desc: "MDR/XDR classification, organism grouping, AWaRe, and mortality"
  contents:
  - prep_classify_mdr_xdr
  - prep_assign_organism_group
  - prep_classify_antibiotic_class
  - prep_classify_aware
  - prep_classify_mortality
  - prep_derive_hai_cai
  - prep_extract_genus
  - prep_extract_species

- title: "Enrichment"
  desc: "Derive missing variables from existing data"
  contents:
  - prep_fill_age
  - prep_assign_age_bins
  - prep_infer_department
  - prep_clean_optional_columns

- title: "Deduplication and collapsing"
  desc: "Event IDs, deduplication, contaminant flagging, and data reshaping"
  contents:
  - prep_create_event_ids
  - prep_deduplicate_events
  - prep_flag_contaminants
  - prep_get_contaminant_list
  - prep_is_contaminant
  - flag_polymicrobial
  - compute_polymicrobial_weight
  - prep_collapse_class_level
  - prep_pivot_ast_wide_to_long
  - prep_create_wide_ast_matrix
  - prep_create_resistance_profile
  - prep_filter_analysis_ready

- title: "Multi-centre stewardship import"
  desc: "Joining and validating ICMR multi-centre stewardship datasets"
  contents:
  - prep_check_columns
  - prep_check_keys
  - prep_validate_table

- title: "Resistance profiles"
  desc: "Marginal resistance, co-resistance, and profile computation"
  contents:
  - compute_marginal_resistance
  - compute_pairwise_coresistance
  - compute_resistance_profiles
  - select_resistance_class

- title: "Burden estimation (YLL/YLD/DALY)"
  desc: "GBD-methodology burden calculations"
  contents:
  - starts_with("daly_")
  - compute_hospital_daly

- title: "LOS modeling"
  desc: "Length-of-stay distribution fitting and comparison"
  contents:
  - safe_fit
  - fit_distributions
  - compare_distribution_aic
  - summarise_distribution
  - plot_los_distributions
  - prepare_los_data
  - get_los_by_resistance

- title: "Burden plots"
  desc: "Hospital-level and organism-level burden visualizations"
  contents:
  - plot_burden_by_hospital
  - plot_burden_by_organism
  - plot_yll_heatmap
  - plot_yld_heatmap

- title: "EDA plots"
  desc: "Exploratory plots for AMR surveillance data"
  contents:
  - plot_top_organisms
  - plot_abx_susceptibility
  - plot_abx_heatmap
  - plot_outcome_distribution
  - plot_outcome_by_organism
  - plot_death_discharged
  - plot_resistance_by_sample
  - plot_outcome_by_agebin
  - plot_mono_poly_by_facility
  - plot_hai_cai_by_facility
  - plot_location_by_facility
  - plot_los_ridge
  - plot_age_ridge
  - plot_los_by_agebin
  - plot_outcome_by_year
  - plot_patients_by_hospital
  - plot_syndrome_distribution

- title: "Visualization"
  desc: "Generic AMR plotting utilities"
  contents:
  - amr_theme
  - get_amr_palette
  - plot_bar
  - plot_grouped_bar
  - plot_stacked_bar
  - plot_heatmap
  - plot_histogram
  - plot_line
  - plot_proportion
  - plot_resistance_heatmap

- title: "Spatial analysis"
  desc: "Spatial metrics and mapping"
  contents:
  - create_spatial_object
  - create_choropleth_map
  - create_interactive_map
  - calculate_spatial_metrics
  - calculate_spatial_autocorrelation
  - calculate_distance_matrix
  - detect_hotspots

- title: "Validation and reporting"
  desc: "Data quality checks and reports"
  contents:
  - validate_data_quality
  - validate_required_fields
  - summarize_column_mapping
  - summarize_data_quality
  - summarize_raw_data
  - summarize_transformations
  - compute_processing_statistics
  - generate_preprocessing_report
  - export_report

- title: "Utilities"
  desc: "Helper functions"
  contents:
  - round_to_sum
  - shorten_drug_class
  - default_column_mappings
  - get_age_bins

authors:
  Saket Choudhary:
    href: https://github.com/saketkc
  Nilanjana Dey:
    href: https://github.com/nilanjanadey
  Nima Jijo:
    href: https://github.com/nimajijo

footer:
  structure:
    left: developed_by
    right: built_with
  components:
    developed_by: "Developed by [Saket Lab](https://saketlab.org)"
    built_with: "Built with [pkgdown](https://pkgdown.r-lib.org/)"
